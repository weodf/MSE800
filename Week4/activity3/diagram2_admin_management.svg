<svg width="980" height="700" viewBox="0 0 980 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="980" height="700" fill="#ffffff"/>

  <!-- ══ Title ══ -->
  <text x="490" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Use Case Diagram 2 — Exchange Rate &amp; Transaction Management (Admin)</text>
  <text x="490" y="48" text-anchor="middle" font-size="11" fill="#555">Purpose: Shows how an Admin manages exchange rates, fees, and monitors all transactions in the system.</text>
  <text x="490" y="65" text-anchor="middle" font-size="11" fill="#555">Key Actors: Admin (manages system), System (automated processes for audit logging)</text>

  <!-- ══ System boundary ══ -->
  <rect x="175" y="80" width="640" height="570" rx="6" fill="none" stroke="#333" stroke-width="1.8" stroke-dasharray="10,4"/>
  <rect x="310" y="72" width="250" height="20" rx="3" fill="#ffffff"/>
  <text x="435" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Money Exchange System</text>

  <!-- ══ ACTOR: Admin (left outside boundary) ══ -->
  <circle cx="80" cy="240" r="18" fill="none" stroke="#111" stroke-width="1.8"/>
  <line x1="80" y1="258" x2="80" y2="308" stroke="#111" stroke-width="1.8"/>
  <line x1="50" y1="278" x2="110" y2="278" stroke="#111" stroke-width="1.8"/>
  <line x1="80" y1="308" x2="54" y2="342" stroke="#111" stroke-width="1.8"/>
  <line x1="80" y1="308" x2="106" y2="342" stroke="#111" stroke-width="1.8"/>
  <text x="80" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Admin</text>

  <!-- ══ ACTOR: System (right outside boundary, dashed = secondary/automated) ══ -->
  <circle cx="890" cy="430" r="18" fill="none" stroke="#111" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="890" y1="448" x2="890" y2="498" stroke="#111" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="860" y1="468" x2="920" y2="468" stroke="#111" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="890" y1="498" x2="864" y2="532" stroke="#111" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="890" y1="498" x2="916" y2="532" stroke="#111" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="890" y="550" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">System</text>
  <text x="890" y="567" text-anchor="middle" font-size="10" fill="#777">«actor»</text>

  <!-- defs -->
  <defs>
    <marker id="inc2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M1 2L9 5L1 8" fill="none" stroke="#166534" stroke-width="1.5"/>
    </marker>
    <marker id="ext2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M1 2L9 5L1 8" fill="none" stroke="#854d0e" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- ══ USE CASES — LEFT COLUMN x=355 ══ -->

  <!-- UC1: Set exchange rate -->
  <ellipse cx="355" cy="130" rx="130" ry="28" fill="#EEF2FF" stroke="#111" stroke-width="1.3"/>
  <text x="355" y="130" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#111">Set exchange rate</text>

  <!-- UC2: Manage fee rules -->
  <ellipse cx="355" cy="225" rx="130" ry="28" fill="#EEF2FF" stroke="#111" stroke-width="1.3"/>
  <text x="355" y="225" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#111">Manage fee rules</text>

  <!-- UC3: Manage user accounts -->
  <ellipse cx="355" cy="335" rx="130" ry="28" fill="#EEF2FF" stroke="#111" stroke-width="1.3"/>
  <text x="355" y="335" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#111">Manage user accounts</text>

  <!-- UC4: Monitor all transactions (CORE) -->
  <ellipse cx="355" cy="445" rx="130" ry="28" fill="#DBEAFE" stroke="#1d4ed8" stroke-width="2"/>
  <text x="355" y="439" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#1d4ed8">Monitor all transactions</text>
  <text x="355" y="455" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#1d4ed8">(core use case)</text>

  <!-- UC5: Generate exchange report -->
  <ellipse cx="355" cy="560" rx="130" ry="28" fill="#EEF2FF" stroke="#111" stroke-width="1.3"/>
  <text x="355" y="560" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#111">Generate exchange report</text>

  <!-- ══ USE CASES — RIGHT COLUMN x=625 ══ -->

  <!-- UC6: Update rate history — «include» -->
  <ellipse cx="640" cy="130" rx="130" ry="28" fill="#F0FDF4" stroke="#166534" stroke-width="1.3" stroke-dasharray="6,3"/>
  <text x="640" y="130" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#166534">Update rate history</text>

  <!-- UC7: Recalculate transaction fee — «include» -->
  <ellipse cx="640" cy="225" rx="130" ry="28" fill="#F0FDF4" stroke="#166534" stroke-width="1.3" stroke-dasharray="6,3"/>
  <text x="640" y="225" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#166534">Recalculate transaction fee</text>

  <!-- UC8: Suspend / activate account — «extend» -->
  <ellipse cx="640" cy="335" rx="130" ry="28" fill="#FEF9C3" stroke="#854d0e" stroke-width="1.3" stroke-dasharray="6,3"/>
  <text x="640" y="329" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854d0e">Suspend account /</text>
  <text x="640" y="345" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854d0e">Activate account</text>

  <!-- UC9: Record audit log — «include» -->
  <ellipse cx="640" cy="445" rx="130" ry="28" fill="#F0FDF4" stroke="#166534" stroke-width="1.3" stroke-dasharray="6,3"/>
  <text x="640" y="445" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#166534">Record audit log</text>

  <!-- UC10: Send transaction alert — «extend» -->
  <ellipse cx="640" cy="560" rx="130" ry="28" fill="#FEF9C3" stroke="#854d0e" stroke-width="1.3" stroke-dasharray="6,3"/>
  <text x="640" y="560" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854d0e">Send transaction alert</text>

  <!-- ══ ASSOCIATION LINES: Admin → Use Cases (solid, no arrowhead) ══ -->
  <line x1="98" y1="230" x2="225" y2="144" stroke="#333" stroke-width="1.3"/>
  <line x1="98" y1="243" x2="225" y2="228" stroke="#333" stroke-width="1.3"/>
  <line x1="98" y1="256" x2="225" y2="332" stroke="#333" stroke-width="1.3"/>
  <line x1="98" y1="268" x2="225" y2="440" stroke="#333" stroke-width="1.3"/>
  <line x1="98" y1="280" x2="225" y2="556" stroke="#333" stroke-width="1.3"/>

  <!-- ASSOCIATION LINES: System → sub-usecases -->
  <line x1="872" y1="446" x2="770" y2="447" stroke="#333" stroke-width="1.3"/>
  <line x1="872" y1="458" x2="770" y2="558" stroke="#333" stroke-width="1.3"/>

  <!-- ══ INCLUDE arrows ══ -->
  <!-- Set exchange rate -include--> Update rate history -->
  <line x1="485" y1="130" x2="510" y2="130" stroke="#166534" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#inc2)"/>
  <text x="498" y="120" text-anchor="middle" font-size="10" fill="#166534">«include»</text>

  <!-- Manage fee rules -include--> Recalculate transaction fee -->
  <line x1="485" y1="225" x2="510" y2="225" stroke="#166534" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#inc2)"/>
  <text x="498" y="215" text-anchor="middle" font-size="10" fill="#166534">«include»</text>

  <!-- Monitor all transactions -include--> Record audit log -->
  <line x1="485" y1="445" x2="510" y2="445" stroke="#166534" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#inc2)"/>
  <text x="498" y="435" text-anchor="middle" font-size="10" fill="#166534">«include»</text>

  <!-- ══ EXTEND arrows ══ -->
  <!-- Manage user accounts -extend--> Suspend/Activate account -->
  <line x1="485" y1="335" x2="510" y2="335" stroke="#854d0e" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#ext2)"/>
  <text x="498" y="325" text-anchor="middle" font-size="10" fill="#854d0e">«extend»</text>

  <!-- Generate exchange report -extend--> Send transaction alert -->
  <line x1="485" y1="560" x2="510" y2="560" stroke="#854d0e" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#ext2)"/>
  <text x="498" y="550" text-anchor="middle" font-size="10" fill="#854d0e">«extend»</text>

  <!-- ══ LEGEND ══ -->
  <rect x="180" y="662" width="620" height="30" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="200" y="677" dominant-baseline="central" font-size="10" font-weight="bold" fill="#333">Legend:</text>

  <ellipse cx="268" cy="677" rx="32" ry="10" fill="#EEF2FF" stroke="#111" stroke-width="1"/>
  <text x="308" y="677" dominant-baseline="central" font-size="10" fill="#333">Primary use case</text>

  <ellipse cx="420" cy="677" rx="32" ry="10" fill="#DBEAFE" stroke="#1d4ed8" stroke-width="2"/>
  <text x="460" y="677" dominant-baseline="central" font-size="10" fill="#1d4ed8">Core use case</text>

  <ellipse cx="560" cy="677" rx="32" ry="10" fill="#F0FDF4" stroke="#166534" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="600" y="677" dominant-baseline="central" font-size="10" fill="#166534">«include» sub-usecase</text>

  <ellipse cx="720" cy="677" rx="32" ry="10" fill="#FEF9C3" stroke="#854d0e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="760" y="677" dominant-baseline="central" font-size="10" fill="#854d0e">«extend» sub-usecase</text>
</svg>
